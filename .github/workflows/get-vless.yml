name: '🚀 ساخت کداسپیس و دریافت لینک VLESS'

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: نصب ابزارهای مورد نیاز (jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: ایجاد کداسپیس
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "⏳ در حال ساخت کداسپیس (این کار حدود ۲ دقیقه طول می‌کشد)..."
          CODESPACE_NAME=$(gh codespace create -r ${{ github.repository }} -m 2-core --display-name "MRH-Proxy" --status | jq -r '.name')
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV
          echo "✅ کداسپیس با نام $CODESPACE_NAME ساخته شد."

      - name: منتظر راه‌اندازی اولیه سرویس‌ها
        run: sleep 30

      - name: دریافت لینک VLESS از لاگ کداسپیس (با انتظار پویا تا ۵ دقیقه)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🔍 در حال جستجوی لینک VLESS در خروجی کداسپیس..."
          MAX_WAIT=300   # حداکثر ۵ دقیقه صبر کن
          INTERVAL=10    # هر ۱۰ ثانیه یکبار چک کن
          ELAPSED=0
          VLESS_LINK=""
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # لاگ کداسپیس را بگیر و لینک را جستجو کن
            VLESS_LINK=$(gh codespace logs -c ${{ env.CODESPACE_NAME }} 2>&1 | grep -oE 'vless://[^ ]+' | head -1)
            if [ -n "$VLESS_LINK" ]; then
              echo "✅ لینک پیدا شد بعد از ${ELAPSED} ثانیه."
              break
            fi
            echo "⏳ هنوز لینکی یافت نشده. ${ELAPSED} ثانیه از ${MAX_WAIT} ثانیه انتظار گذشته..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ -z "$VLESS_LINK" ]; then
            echo "❌ خطا: پس از ${MAX_WAIT} ثانیه انتظار، لینک VLESS یافت نشد."
            echo "لاگ کامل کداسپیس برای بررسی:"
            gh codespace logs -c ${{ env.CODESPACE_NAME }} 2>&1
            exit 1
          fi
          echo "VLESS_LINK=$VLESS_LINK" >> $GITHUB_ENV

      - name: نمایش لینک به کاربر
        run: |
          echo "🎉 لینک VLESS شما آماده است:"
          echo "----------------------------------------"
          echo "${{ env.VLESS_LINK }}"
          echo "----------------------------------------"
          echo "📌 این لینک را کپی کرده و در کلاینت خود وارد کنید."
          echo "🆔 شناسه کداسپیس: ${{ env.CODESPACE_NAME }}"
          echo "🌐 برای مدیریت کداسپیس (توقف/حذف) به این آدرس بروید:"
          echo "   https://github.com/codespaces"

      - name: ذخیره توکن در کداسپیس (برای Idle Monitor)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh codespace exec -c ${{ env.CODESPACE_NAME }} -- bash -c "echo '$GH_TOKEN' > ~/.gh_token && chmod 600 ~/.gh_token"
          echo "✅ توکن برای استفاده Idle Monitor در کداسپیس ذخیره شد."

      - name: نگه داشتن کداسپیس فعال
        run: |
          echo "✅ کداسپیس فعال نگه داشته شد. تا زمانی که خودتان آن را متوقف نکنید یا Idle Monitor آن را متوقف کند، روشن می‌ماند."
